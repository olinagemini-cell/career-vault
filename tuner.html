<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Hermes 古琴调音器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  touch-action: manipulation;
}
.header { text-align: center; margin-bottom: 12px; width: 100%; }
.header h1 { font-size: 22px; font-weight: 600; color: #d4a574; letter-spacing: 2px; }
.header p { font-size: 12px; color: #888; margin-top: 2px; }
.base-selector { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }
.base-btn {
  padding: 6px 16px; border: 1px solid #444; border-radius: 16px;
  background: transparent; color: #888; font-size: 13px; cursor: pointer;
  transition: all 0.2s; touch-action: manipulation; font-family: inherit;
}
.base-btn.active { background: #d4a574; color: #1a1a2e; border-color: #d4a574; font-weight: 600; }
.tuning-mode-selector { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.mode-btn {
  padding: 6px 14px; border: 1px solid #444; border-radius: 16px;
  background: transparent; color: #888; font-size: 13px; cursor: pointer;
  transition: all 0.2s; touch-action: manipulation; font-family: inherit;
}
.mode-btn.active { background: #d4a574; color: #1a1a2e; border-color: #d4a574; font-weight: 600; }
.visualizer { width: 100%; max-width: 400px; text-align: center; margin-bottom: 12px; }
.needle-container { position: relative; width: 240px; height: 240px; margin: 0 auto; }
.needle-bg {
  width: 100%; height: 100%; border-radius: 50%;
  background: conic-gradient(#e74c3c 0deg, #e67e22 20deg, #f1c40f 40deg, #2ecc71 60deg, #2ecc71 100deg, #f1c40f 120deg, #e67e22 140deg, #e74c3c 160deg, #e74c3c 200deg, #e67e22 220deg, #f1c40f 240deg, #2ecc71 260deg, #2ecc71 300deg, #f1c40f 320deg, #e67e22 340deg, #e74c3c 360deg);
  mask: radial-gradient(circle at center, transparent 58%, black 59%, black 100%);
  -webkit-mask: radial-gradient(circle at center, transparent 58%, black 59%, black 100%);
  position: relative;
}
.needs-center {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 72px; height: 72px; border-radius: 50%; background: #1a1a2e;
  border: 2px solid #333; z-index: 2;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.needs-center .string-label { font-size: 24px; font-weight: 700; color: #d4a574; line-height: 1; }
.needs-center .cents { font-size: 12px; color: #aaa; margin-top: 1px; }
.needle {
  position: absolute; top: 50%; left: 50%; width: 3px; height: 82px;
  background: #fff; border-radius: 2px; transform-origin: bottom center;
  transform: translate(-50%, -100%) rotate(0deg);
  transition: transform 0.08s ease-out; z-index: 1;
  box-shadow: 0 0 6px rgba(255,255,255,0.25);
}
.needle-dot {
  position: absolute; top: calc(50% - 6px); left: calc(50% - 6px);
  width: 12px; height: 12px; border-radius: 50%; background: #fff; z-index: 3;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}
.status-text { font-size: 15px; margin-bottom: 2px; min-height: 22px; color: #bbb; }
.detail-text { font-size: 12px; color: #777; margin-bottom: 14px; min-height: 18px; }
.strings-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; max-width: 400px; margin-bottom: 16px; }
.string-item { text-align: center; padding: 8px 2px; border-radius: 10px; background: #222; transition: all 0.2s; cursor: pointer; }
.string-item.active { background: #d4a57422; border: 1px solid #d4a574; }
.string-item .num { font-size: 22px; font-weight: 700; color: #d4a574; }
.string-item .note { font-size: 13px; color: #aaa; margin-top: 1px; }
.string-item .freq { font-size: 10px; color: #666; margin-top: 1px; }
.string-item .status { font-size: 11px; margin-top: 2px; min-height: 16px; }
.controls { display: flex; gap: 12px; margin-bottom: 12px; }
.btn {
  padding: 8px 24px; border: none; border-radius: 22px; font-size: 14px;
  font-weight: 600; cursor: pointer; transition: all 0.2s;
  touch-action: manipulation; font-family: inherit;
}
.btn-start { background: #d4a574; color: #1a1a2e; }
.btn-start:disabled { background: #444; color: #666; cursor: not-allowed; }
.btn-start.listening { background: #e74c3c; color: #fff; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.auto-toggle { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; font-size: 12px; color: #888; }
.auto-toggle input { width: 16px; height: 16px; accent-color: #d4a574; }
.footer { font-size: 11px; color: #555; margin-top: 10px; text-align: center; }
@media (max-width: 380px) {
  .needle-container { width: 200px; height: 200px; }
  .needs-center { width: 64px; height: 64px; }
  .string-item .num { font-size: 18px; }
  .strings-grid { gap: 4px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>🎶 古琴调音器</h1>
  <p>— 纯净 · 免费 · 无广告 —</p>
</div>
<div class="base-selector" id="baseSelector">
  <button class="base-btn" data-base="375">A=375Hz</button>
  <button class="base-btn active" data-base="400">A=400Hz</button>
  <button class="base-btn" data-base="440">A=440Hz</button>
</div>
<div class="tuning-mode-selector" id="modeSelector"></div>
<div class="visualizer">
  <div class="needle-container">
    <div class="needle-bg"></div>
    <div class="needle" id="needle"></div>
    <div class="needle-dot"></div>
    <div class="needs-center">
      <div class="string-label" id="stringLabel">—</div>
      <div class="cents" id="centsLabel">0¢</div>
    </div>
  </div>
</div>
<div class="status-text" id="statusText">点击开始调音</div>
<div class="detail-text" id="detailText"></div>
<div class="strings-grid" id="stringsGrid"></div>
<div class="controls">
  <button class="btn btn-start" id="startBtn">🎤 开始调音</button>
</div>
<div class="auto-toggle">
  <input type="checkbox" id="autoMode" checked>
  <label for="autoMode">自动识别弦号</label>
</div>
<div class="footer">纯律调音 · 需麦克风权限 · Hermes 特制</div>

<script>
const MODE_RATIOS = {
  '正调': { ratios: [1, 10/9, 4/3, 3/2, 5/3, 2, 20/9], notes: ['C2','D2','F2','G2','A2','C3','D3'] },
  '慢角调': { ratios: [1, 10/9, 5/4, 3/2, 5/3, 2, 20/9], notes: ['C2','D2','E2','G2','A2','C3','D3'] },
  '蕤宾调': { ratios: [1, 10/9, 4/3, 3/2, 16/9, 2, 20/9], notes: ['C2','D2','F2','G2','A#2','C3','D3'] },
  '慢宫调': { ratios: [8/9, 10/9, 4/3, 3/2, 5/3, 2, 20/9], notes: ['A#1','D2','F2','G2','A2','C3','D3'] },
  '紧羽调': { ratios: [1, 10/9, 4/3, 3/2, 5/3, 17/9, 23/9], notes: ['C2','D2','F2','G2','A2','C#3','E3'] },
};

let currentBase = 400, currentMode = '正调';
let ctx = null, analyser = null, stream = null, listening = false, anim = null;
let autoMode = true, activeIdx = -1, smoothCents = 0, lastTime = 0;
const NAMES = ['一弦','二弦','三弦','四弦','五弦','六弦','七弦'];

function getStrings(base, key) {
  const m = MODE_RATIOS[key];
  return m.ratios.map((r,i) => ({ name: NAMES[i], note: m.notes[i], freq: +((base * r / (5/3)).toFixed(2)) }));
}

function detectPitch(buf, sr) {
  // 能量门限：计算信号有效值，太安静就不测
  let sumSq = 0;
  for (let i = 0; i < buf.length; i++) sumSq += buf[i]*buf[i];
  const rms = Math.sqrt(sumSq/buf.length);
  if (rms < 0.02) return 0; // 太安静了，忽略

  // 差分（YIN风格）自相关，对噪音更鲁棒
  const len = buf.length, half = len/2|0;
  let diff = new Float32Array(half), minDiff = Infinity;
  for (let t = 0; t < half; t++) {
    let s = 0;
    for (let i = 0; i < half; i++) s += (buf[i] - buf[i+t])**2;
    diff[t] = s;
    if (t > 0 && s < minDiff) minDiff = s;
  }
  // 累积均值归一化
  let cumSum = 0;
  for (let t = 1; t < half; t++) {
    cumSum += diff[t];
    const normed = diff[t] / (cumSum / t);
    if (normed < 0.12) { // 阈值从0.15降到0.12更敏感，但结合归一化实际上更干净
      // 抛物线插值
      const d = (diff[t+1]-diff[t-1])/(2*(2*diff[t]-diff[t-1]-diff[t+1]));
      return sr / (t + d);
    }
  }
  return 0;
}

function findNearest(f, base, key) {
  const ss = getStrings(base, key);
  let best=0, bestD=Infinity;
  ss.forEach((s,i)=> { const d=Math.abs(f-s.freq); if(d<bestD){bestD=d;best=i;} });
  return best;
}

function centsOff(d,t) { return 1200*Math.log2(d/t); }

function process() {
  if (!listening || !analyser) return;
  const buf = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buf);
  const f = detectPitch(buf, ctx.sampleRate);
  if (f > 50 && f < 2000) {
    const ss = getStrings(currentBase, currentMode);
    let idx = autoMode ? findNearest(f, currentBase, currentMode) : (activeIdx>=0 ? activeIdx : findNearest(f, currentBase, currentMode));
    if (autoMode || activeIdx >= 0) {
      const tf = ss[idx].freq, c = centsOff(f, tf);
      smoothCents = smoothCents*0.75 + c*0.25;
      update(idx, f, smoothCents, tf);
    }
  } else if (Date.now()-lastTime > 800) {
    // 超过800ms没检测到稳定音高 → 回到就绪状态
    // 但保留上次检测到的弦号和指针位置，不归零
    if (document.getElementById('st').textContent.indexOf('🎧') === -1) {
      document.getElementById('st').textContent = '等待拨弦...';
      document.getElementById('dt').textContent = '拨下一根弦继续调音';
    }
  }
  lastTime = Date.now();
  anim = requestAnimationFrame(process);
}

function update(idx, f, c, tf) {
  activeIdx = idx; const s = getStrings(currentBase, currentMode)[idx];
  document.getElementById('stringLabel').textContent = s.name;
  const cr = Math.round(c);
  document.getElementById('centsLabel').textContent = (cr>0?'+':'')+cr+'¢';
  const a = Math.max(-90, Math.min(90, c*0.7));
  document.getElementById('needle').style.transform = `translate(-50%, -100%) rotate(${a}deg)`;
  let st = '';
  if (Math.abs(c)<3) st = `✅ ${s.name}（${s.note}·${tf}Hz）准了！`;
  else if (Math.abs(c)<10) st = `👍 ${s.name}（${s.note}）接近了`;
  else st = `${s.name}（${s.note}·${tf}Hz）${c>0?'偏高🔺 松一点':'偏低🔻 紧一点'}`;
  document.getElementById('statusText').textContent = st;
  document.getElementById('detailText').textContent = `检测: ${f.toFixed(1)}Hz → 目标: ${tf.toFixed(1)}Hz`;
  const items = document.querySelectorAll('.string-item');
  items.forEach((el,i) => {
    el.classList.toggle('active', i===idx);
    el.querySelector('.status').textContent = i===idx ? (Math.abs(c)<3?'✅':c>0?'🔺':'🔻') : '';
  });
}

function idle() {
  document.getElementById('statusText').textContent = '等待拨弦...';
  document.getElementById('detailText').textContent = '';
  document.getElementById('needle').style.transform = 'translate(-50%,-100%) rotate(0deg)';
  document.getElementById('stringLabel').textContent = '—';
  document.getElementById('centsLabel').textContent = '0¢';
  document.querySelectorAll('.string-item').forEach(el => { el.classList.remove('active'); el.querySelector('.status').textContent=''; });
}

function renderAll() {
  const mc = document.getElementById('modeSelector');
  mc.innerHTML = '';
  Object.keys(MODE_RATIOS).forEach(k => {
    const b = document.createElement('button');
    b.className = 'mode-btn' + (k===currentMode?' active':'');
    b.textContent = k;
    b.onclick = () => { if(!listening){currentMode=k; renderAll(); renderGrid(); idle();} };
    mc.appendChild(b);
  });
  renderGrid(); idle();
}
function renderGrid() {
  const g = document.getElementById('stringsGrid');
  g.innerHTML = '';
  getStrings(currentBase, currentMode).forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'string-item';
    d.innerHTML = `<div class="num">${s.name[0]}</div><div class="note">${s.note}</div><div class="freq">${s.freq}Hz</div><div class="status"></div>`;
    d.onclick = () => { if(!autoMode){activeIdx=i; updateStringGridHighlight(i);} };
    g.appendChild(d);
  });
}
function updateStringGridHighlight(idx) {
  document.querySelectorAll('.string-item').forEach((el,i) => {
    el.classList.toggle('active', i===idx);
  });
}

document.querySelectorAll('.base-btn').forEach(b => {
  b.onclick = () => {
    if(listening) return;
    document.querySelectorAll('.base-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentBase = parseInt(b.dataset.base);
    renderGrid(); idle();
    document.getElementById('detailText').textContent = `基准 A=${currentBase}Hz · ${currentMode}`;
  };
});

document.getElementById('startBtn').onclick = async () => {
  const btn = document.getElementById('startBtn');
  if(listening) {
    listening=false; if(anim) cancelAnimationFrame(anim);
    if(stream) stream.getTracks().forEach(t=>t.stop());
    if(ctx) ctx.close(); ctx=null; analyser=null; stream=null;
    btn.textContent='🎤 开始调音'; btn.className='btn btn-start'; idle(); document.getElementById('statusText').textContent='已停止';
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = ctx.createAnalyser(); analyser.fftSize = 4096;
    ctx.createMediaStreamSource(stream).connect(analyser);
    listening=true; btn.textContent='⏹ 停止'; btn.className='btn btn-start listening';
    document.getElementById('statusText').textContent='🎧 监听中，拨弦吧...';
    document.getElementById('detailText').textContent = `基准 A=${currentBase}Hz · ${currentMode}`;
    smoothCents=0; lastTime=Date.now(); process();
  } catch(e) { document.getElementById('statusText').textContent='❌ 无法访问麦克风'; }
};

document.getElementById('autoMode').onchange = (e) => {
  autoMode = e.target.checked;
  if(autoMode){activeIdx=-1; document.querySelectorAll('.string-item').forEach(el=>el.classList.remove('active'));}
};

renderAll();
</script>
</body>
</html>
